<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <script src="codes.js" defer></script>
    <script src="app.js" defer></script>
    <title>Currency Converter</title>
  </head>
  <body>
    <div class="container">
      <h1>Currency Converter</h1>
      <form>
        <div class="from-div">
          <p>Enter Amount</p>
          <input type="number" id="amount" value="1" />
          <p id="error"></p>
        </div>
        <div class="dropdown">
          <div class="from">
            <p>From</p>
            <div class="select-container">
              <img src="https://flagsapi.com/US/flat/64.png" id="from-flag" />
              <select id="from-select"></select>
            </div>
          </div>
          <i class="fa-solid fa-arrow-right-arrow-left" id="swap-btn"></i>
          <div class="to">
            <p>To</p>
            <div class="select-container">
              <img src="https://flagsapi.com/IN/flat/64.png" id="to-flag" />
              <select id="to-select"></select>
            </div>
          </div>
        </div>
        <p class="msg">1 USD = 94 INR</p>
        <button id="btn">Get Exchange Rate</button>
      </form>
    </div>
  </body>
</html>
